{% extends "base.html" %}

{% block stylesheet %}
<!-- Bootstrap CSS CDN -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.0/css/bootstrap.min.css"
   integrity="sha384-9gVQ4dYFwwWSjIDZnLEWnxCjeSWFphJiwGPXr1jddIhOegiu1FwO5qRGvFXOdJZ4" crossorigin="anonymous">
<!-- Our Custom CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='quiz.css') }}">
<!-- Scrollbar Custom CSS -->
<link rel="stylesheet"
   href="https://cdnjs.cloudflare.com/ajax/libs/malihu-custom-scrollbar-plugin/3.1.5/jquery.mCustomScrollbar.min.css">
{% endblock stylesheet %}

{% block main %}
<div class="d-flex w-100">
   <!-- Sidebar  -->
   <nav id="sidebar" class="p-3">
      <div class="row align-items-center mb-3">
         <i class="fas fa-arrow-left col-3 align-middle" onclick="prevSection()"></i>
         <span class="fs-5 section-name text-center col-6">
            <!-- SECTION NAME WILL BE INJECTED HERE -->
         </span>
         <i class="fas fa-arrow-right col-3 align-middle" onclick="nextSection()"></i>
      </div>

      <div class="qn-buttons">
         <!-- QUESTION BUTTONS WILL BE INJECTED HERE -->
      </div>
   </nav>

   <!-- Page Content  -->
   <div id="content" class="p-4">
      <!-- Questions Attempted Modal -->
      <div class="modal fade" id="questionsAttemptedModal" tabindex="-1" aria-labelledby="questionsAttemptedModalLabel"
         aria-hidden="true">
         <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content snmb">
               <div class="modal-header">
                  <h5 class="modal-title" id="questionsAttemptedModalLabel">Questions Attempted</h5>
                  <button type="button" class="btn-close" data-dismiss="modal" aria-label="Close"></button>
               </div>
               <div class="modal-body" id="questionsAttemptedBody">
                  <!-- LIST OF SECTIONS WITH QUESTIONS ATTEMPTED WILL BE DISPLAYED HERE -->
               </div>
               <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                  <button type="button" class="btn btn-primary" onclick="displayScoreModal()">Finish</button>
               </div>
            </div>
         </div>
      </div>

      <!-- Score Modal -->
      <div class="modal fade" id="scoreModal" tabindex="-1" aria-labelledby="scoreModalLabel" aria-hidden="true">
         <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content snmb">
               <div class="modal-header">
                  <h5 class="modal-title" id="scoreModalLabel">Final Score</h5>
                  <button type="button" class="btn-close" data-dismiss="modal" aria-label="Close"></button>
               </div>
               <div class="modal-body" id="scoreBody">
                  <!-- LIST OF SECTIONS WITH QUESTIONS ATTEMPTED WILL BE DISPLAYED HERE -->
               </div>
               <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" onclick="resetAndGoHome()">Home</button>
                  <button type="button" class="btn btn-primary" data-dismiss="modal">Details</button>
               </div>
            </div>
         </div>
      </div>

      <div class="mb-3 p-1 d-flex">
         <button class="btn btn-success me-2" id="sidebarCollapse">
            <i class="fas fa-align-left"></i>
         </button>
         <button class="btn btn-primary me-2" onclick="toggleDarkMode()">
            <i class="fas fa-moon toggle-dark"></i>
         </button>

         <div id="timer" class="invisible ml-auto">
            <p class="time-left bg-secondary p-2 border border-info rounded d-inline">
               <span class="me-2 text-white">Time Left</span>
               <span class="p-1 border border-danger rounded bg-light text-dark">
                  <span id="tl-hours">0</span>H
                  <span id="tl-minutes">0</span>M
                  <span id="tl-seconds">0</span>S
               </span>
            </p>
         </div>
      </div>


      <!-- Question And Options -->
      <div class="content-box">
         <pre class="question snmt">
            <!-- QUESTION WILL BE INJECTED HERE -->
         </pre>
         <div class="options">
            <!-- OPTIONS WILL BE INJECTED HERE -->
         </div>
         <div class="explanation">
            <!-- EXPLANATION WILL BE INJECTED HERE -->
         </div>
      </div>

      <!-- Prev, Next, Mark For Review, Finish Buttons -->
      <div class="d-flex my-3">
         <button class="btn btn-primary px-3 me-2" type="button" onclick="prevQuestion()">Prev</button>
         <button class="btn btn-primary px-3 me-2" type="button" onclick="nextQuestion()">Next</button>
         <button id="markForReview" class="btn btn-warning px-3 text-dark" type="button" onclick="markForReview()">Mark
            For Review</button>
         <button class="btn btn-danger px-3 ml-auto" type="button" id="finishQuiz"
            onclick="displayAttempts()">Finish</button>
      </div>
   </div>

</div>
{% endblock main %}


{% block scripts %}
<!-- jQuery CDN - Slim version (=without AJAX) -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
   integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<!-- Popper.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js"
   integrity="sha384-cs/chFZiN24E4KMATLdqdvsezGxaGsi4hLGOzlXwp5UZB1LY//20VyM2taTB4QvJ" crossorigin="anonymous"></script>
<!-- Bootstrap JS -->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.0/js/bootstrap.min.js"
   integrity="sha384-uefMccjFJAIv6A+rW+L4AHf99KvxDjWSu1z9VI8SKNVmz4sk7buKt/6v9KI65qnm" crossorigin="anonymous"></script>
<!-- jQuery Custom Scroller CDN -->
<script
   src="https://cdnjs.cloudflare.com/ajax/libs/malihu-custom-scrollbar-plugin/3.1.5/jquery.mCustomScrollbar.concat.min.js"></script>

<script type="text/javascript">
   $(document).ready(function () {
      $("#sidebar").mCustomScrollbar({
         theme: "minimal"
      });
      $('#sidebarCollapse').on('click', function () {
         $('#sidebar, #content').toggleClass('active');
         $('.collapse.in').toggleClass('in');
         $('a[aria-expanded=true]').attr('aria-expanded', 'false');
      });
   });
</script>

<script>
   let questions = '{{ questions_json|tojson }}'
   questions = questions.substring(1, questions.length - 1)
   questions = JSON.parse(questions)
</script>
<script src="{{ url_for('static', filename='quiz.js') }}"></script>
{% endblock scripts %}
