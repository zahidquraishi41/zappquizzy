<!-- ACCEPTS FOLLOWING PARAMETERS -->
<!-- title: str -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">

    {% block stylesheet %} {% endblock %}
    <title>{{ title }} - Quizzy </title>
</head>

<body class="text-dark bg-light">
    {% block main %} {% endblock %}
    <div class="container">
        <div class="nav d-flex mt-3">
            <button class="btn btn-primary ms-auto" onclick="toggleDarkMode()">
                <i class="fas fa-moon toggle-dark"></i>
            </button>
        </div>
        {% block content %} {% endblock %}
    </div>

    <!-- Dark Mode -->
    <script src="{{ url_for('static', filename='darkmode.js') }}"></script>

    <!-- FontAwesome JS -->
    <script src="https://kit.fontawesome.com/7767b3e406.js" crossorigin="anonymous"></script>
    {% block scripts %} {% endblock %}
</body>

</html>
